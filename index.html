<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --primary-color: #6366f1;
            --bg-color: #f8fafc;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
        }

        .maintenance-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            max-width: 450px;
            width: 90%;
        }

        .icon-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }

        .maintenance-icon {
            font-size: 4rem;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        h1 {
            color: var(--text-main);
            font-size: 1.875rem;
            margin: 0 0 1rem 0;
            font-weight: 800;
        }

        p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #e0e7ff;
            color: var(--primary-color);
            padding: 6px 16px;
            border-radius: 99px;
            font-size: 0.875rem;
            font-weight: 600;
        }

        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--primary-color);
            border-radius: 50%;
        }

        .progress-bar {
            height: 6px;
            width: 100%;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 2rem;
        }

        .progress-fill {
            height: 100%;
            width: 65%; /* Change this based on progress */
            background: var(--primary-color);
            border-radius: 10px;
            transition: width 0.5s ease;
        }
    </style>
    <title>Under Maintenance</title>
</head>
<body>

    <div class="maintenance-card">
        <div class="icon-wrapper">
            <span class="maintenance-icon">🛠️</span>
        </div>
        
        <div class="status-badge">
            <span class="dot"></span>
            <span>Currently Under Maintenance</span>
        </div>

        <h1>Refining the Experience</h1>
        
        <p>
            I am currently fine tuning the website to serve it better. It'll be back online soon!
        </p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <p style="font-size: 0.75rem; margin-top: 0.5rem;">Estimated progress: 65%</p>
    </div>

</body>
</html>
